<?xml version="1.0" encoding="utf-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 20010904//EN"
"http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<!-- <?xml-stylesheet type="text/css" href="slide.css" ?> -->
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 500">
  <title>The traditional Yin-Yang diagram</title>
  <style type="text/css">
        .yin   { stroke: none; fill:url(#YinGradient);  }					
        .yang  { fill: yellow; stroke: none }
					.shadow3D { filter: url(#3deffect) }
					.noshadow3D { filter: url(#3deffectNoShadow) }
  </style>
	 <defs>
	    <linearGradient id="YinGradient" x1="0" x2="0" y1="-200" y2="200" spreadMethod="pad" gradientUnits="userSpaceOnUse">
			    <stop offset="0" stop-color="brown"/>
					<stop offset="100%" stop-color="blue"/>
			</linearGradient>
			<filter id="3deffect">
  			<feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
  			<feOffset in="blur" dx="6" dy="6" result="offsetBlur"/>
  			<feSpecularLighting in="blur" surfaceScale="8" specularConstant="1" specularExponent="10" result="specOut">
  				<fePointLight x="-5000" y="-10000" z="5000"/>
  			</feSpecularLighting>
  			<feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
  			<feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litPaint"/>
  			<feMerge>
  				<feMergeNode in="offsetBlur"/>
  				<feMergeNode in="litPaint"/>
  			</feMerge>
		</filter>
			<filter id="3deffectNoShadow">
  			<feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
  			<feOffset in="blur" dx="6" dy="6" result="offsetBlur"/>
  			<feSpecularLighting in="blur" surfaceScale="8" specularConstant="1" specularExponent="10" result="specOut">
  				<fePointLight x="-5000" y="-10000" z="5000"/>
  			</feSpecularLighting>
  			<feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
  			<feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litPaint"/>
		</filter>
	 </defs>		
  <g transform="translate(250,250)">
    <circle class="yin shadow3D" r="202"/>

    <path d="M-200,0 A 100 100 0 0,1, 0,0 A 100 100 0 0,0 200,0 A 200,200 0 0,0 -200,0Z"
    class="yang shadow3D" />

    <circle class="yang noshadow3D" r="10" cx="-100" />

    <circle class="yin noshadow3D" r="10" cx="100"  />
  </g>
</svg>

