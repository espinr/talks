<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg  width="800" height="600" >
<defs>
<style type="text/css">
<![CDATA[
rect {stroke:black;fill:white;}
line {stroke:red;stroke-width:4}
rect.box {stroke:none;fill:rgb(140, 189, 237)}
text {font-family:Arial;font-size:20}

]]>
</style>
</defs>

<rect width="800" height="600" class="background"/>

<!-- **************  Screen Display Area  ******************** -->

<g transform="scale(0.8)">
 
  
  <text x="200" y="50" style="font-size:28; color:white">Establishes local coordinate system</text>
  
  <g transform="translate(10,40)">
  <rect style="fill:white;"  width="120" height="30"/>
  <text x="10" y="24" style="color:black;">&lt;svg></text>
  </g>
  
  
  <g transform="translate(10,680)">
  <rect style="fill:white;"  width="120" height="30"/>
  <text x="10" y="24" style="color:black;">&lt;/svg></text>
  </g>
  
  
  
  
  <g transform="translate(60,80)">
  <rect style="fill:yellow"  width="880" height="590"/>
  
  
  
  <g transform="translate(10,10)">
  <rect style="fill:white;"  width="80" height="30"/>
  <text x="10" y="24" style="color:black;">&lt;g></text>
  </g>
  
  <g transform="translate(10,550)">
  <rect style="fill:white;"  width="80" height="30"/>
  <text x="10" y="24" style="color:black;">&lt;/g></text>
  </g>
  
  
  
  
  <g transform="translate(60,50)">
  <rect style="fill:green"  width="800" height="240"/>
  
  <g transform="translate(10,10)">
  <rect style="fill:white;"  width="80" height="30"/>
  <text x="10" y="24" style="color:black;">&lt;g></text>
  </g>
  
  <g transform="translate(100,15)">
  <rect style="fill:white;"  width="90" height="30"/>
  <text x="10" y="24" style="color:red;">&lt;path></text>
  </g>
  
  <g transform="translate(100,50)">
  <rect style="fill:white;"  width="90" height="30"/>
  <text x="10" y="24" style="color:red;">&lt;text></text>
  </g>
  
  <g transform="translate(200,15)">
  <rect style="fill:white;"  width="100" height="30"/>
  <text x="10" y="24" style="color:blue;">&lt;rect></text>
  </g>
  
  <g transform="translate(280,40)">
  <rect style="fill:white;"  width="100" height="30"/>
  <text x="10" y="24" style="color:blue;">&lt;circle></text>
  </g>
  
  <g transform="translate(360,65)">
  <rect style="fill:white;"  width="100" height="30"/>
  <text x="10" y="24" style="color:blue;">&lt;ellipse></text>
  </g>
  
  <g transform="translate(440,90)">
  <rect style="fill:white;"  width="100" height="30"/>
  <text x="10" y="24" style="color:blue;">&lt;line></text>
  </g>
  
  <g transform="translate(520,115)">
  <rect style="fill:white;"  width="100" height="30"/>
  <text x="10" y="24" style="color:blue;">&lt;polygon></text>
  </g>
  
  <text x="400" y="50" style="font-size:36;color:yellow">Graphics primitives</text>
  
  <g transform="translate(10,200)">
  <rect style="fill:white;"  width="80" height="30"/>
  <text x="10" y="24" style="color:black;">&lt;/g></text>
  </g>
  
  </g>
  
  
  <g transform="translate(60,300)">
  <rect style="fill:green"  width="800" height="240"/>
  
  
  
  <g transform="translate(10,10)">
  <rect style="fill:white;"  width="180" height="30"/>
  <text x="10" y="24" style="color:black;">&lt;g transform="..></text>
  </g>
  
  <g transform="translate(100,50)">
  <rect style="fill:white;"  width="190" height="30"/>
  <text x="10" y="24" style="color:blue;">&lt;rect style="..."/></text>
  </g>
  
  <g transform="translate(300,10)">
  <rect style="fill:white;"  width="190" height="30"/>
  <text x="10" y="24" style="color:blue;">Filtering</text>
  </g>
  
  <g transform="translate(300,60)">
  <rect style="fill:white;"  width="190" height="30"/>
  <text x="10" y="24" style="color:green;">Animation</text>
  </g>
  
  <g transform="translate(300,110)">
  <rect style="fill:white;"  width="190" height="30"/>
  <text x="10" y="24" style="color:red;">Clipping</text>
  </g>
  
  <text x="500" y="50" style="font-size:28;color:yellow">Paths can be</text>
  <text x="500" y="80" style="font-size:28;color:yellow">filled</text>
  <text x="500" y="110" style="font-size:28;color:yellow">and stroked</text>
  
  <g transform="translate(10,200)">
  <rect style="fill:white;"  width="80" height="30"/>
  <text x="10" y="24" style="color:black;">&lt;/g></text>
  </g>
  
  
  </g>
</g>
</g>
