</g>

<g transform="translate(10,70)">
<rect width="350" height="40"/>
<text x="10" y="24"  style="color:black">&lt;!DOCTYPE exam [ </text>
</g>


<g transform="translate(400,20)">
<rect width="350" height="40"/>
<text x="10" y="24"  style="color:red">Document Type Definition</text>
</g>



<g transform="translate(30,120)">


<rect style="fill:yellow"  width="500" height="360"/>


<g transform="translate(10,10)">
<rect width="380" height="40"/>
<text x="10" y="24"  style="color:blue">&lt;!ELEMENT exam (student , qapair*) ></text>
</g>

<g transform="translate(30,60)">
<rect width="440" height="40"/>
<text x="10" y="24"  style="color:blue">&lt;!ATTLIST exam paper CDATA #REQUIRED></text>
</g>

<g transform="translate(10,110)">
<rect width="380" height="40"/>
<text x="10" y="24"  style="color:blue">&lt;!ELEMENT student (#PCDATA) ></text>
</g>

<g transform="translate(10,160)">
<rect width="380" height="40"/>
<text x="10" y="24"  style="color:blue">&lt;!ELEMENT qapair (question,answer) ></text>
</g>

<g transform="translate(30,210)">
<rect width="460" height="40"/>
<text x="10" y="24"  style="color:blue">&lt;!ATTLIST qapair number CDATA #REQUIRED></text>
</g>

<g transform="translate(10,260)">
<rect width="380" height="40"/>
<text x="10" y="24"  style="color:blue">&lt;!ELEMENT question (#PCDATA) ></text>
</g>

<g transform="translate(10,310)">
<rect width="380" height="40"/>
<text x="10" y="24"  style="color:blue">&lt;!ELEMENT answer (#PCDATA) ></text>
</g>

</g>


<g transform="translate(10,500)">
<rect width="150" height="40"/>
<text x="10" y="24"  style="color:black">] ></text>
</g>

<g transform="matrix(1 0 0 1 800 300)">
