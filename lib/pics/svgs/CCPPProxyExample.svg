<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-2 -2 1000 200">
  <title>CC/PP Proxy Profile Example</title>
  <desc>An RDF graph showing the CC/PP Proxy Profile example from the W3C document</desc>
  <defs>
    <path id="arrowhead" class="yellowish" d="M0 0 L -10 10 L -10 -10 z"/>
	   <g id="arrow">
	    <line x1="0" y1="0" x2="330" y2="0" class="yellowish" style="stroke-width:3"/>
	    <use xlink:href="#arrowhead" x="330" y="0"/>
	   </g>

	  <g id="component">
	    <use xlink:href="#arrow" x="0" y="0"/>
	    <text class="darkBlueish" style="text-anchor:end" x="300" y="-10">ccpp-proxy:proxyBehavior</text>
	  </g> 
	  <g id="applicability">
	    <use xlink:href="#arrow" x="0" y="0"/>
	    <text class="darkBlueish" style="text-anchor:end" x="300" y="-10">ccpp-proxy:applicability</text>
	  </g> 
	  <g id="allow">
	    <use xlink:href="#arrow" x="0" y="0"/>
	    <text class="darkBlueish" style="text-anchor:end" x="300" y="-10">ccpp-proxy:proxyAllow</text>
	  </g> 
	  <g id="clientType">
	    <use xlink:href="#arrow" x="0" y="0"/>
	    <text class="darkBlueish" style="text-anchor:end" x="300" y="-10">ccpp-client:type</text>
	  </g> 
	  <g id="clientSchema">
	    <use xlink:href="#arrow" x="0" y="0"/>
	    <text class="darkBlueish" style="text-anchor:end" x="300" y="-10">ccpp-client:schema</text>
	  </g> 
	  <g id="wmlVersion">
	    <use xlink:href="#arrow" x="0" y="0"/>
	    <text class="yellowish" style="text-anchor:end" x="300" y="-10">pf:wmlVersion</text>
	  </g> 

	  <!-- ============================================================================ -->
    <g id="resource">
      <ellipse class="lightGreenish" style="stroke:none" cx="0" cy="0" rx="130" ry="20"/>
    </g>
    <g id="literal">
      <rect class="lightGreenish" style="stroke:none" x="-130" y="-20" width="260" height="40"/>
    </g>
    <g id="My" transform="translate(130,20)">
      <use xlink:href="#resource"/>
      <text class="reddish" style="text-anchor:middle" x="0" y="5">Proxy Profile</text>
    </g>
    <!-- ============================================================================ -->
    <g id="R_TH" transform="translate(130,20)">
      <use xlink:href="#resource"/>
      <text class="reddish" style="text-anchor:middle" x="0" y="5">Proxy Behavior</text>
    </g>
    <!-- ============================================================================ -->
    <g id="Empty" transform="translate(130,20)">
      <use xlink:href="#resource"/>
    </g>
    <g id="L_320" transform="translate(130,20)">
      <use xlink:href="#literal"/>
      <text class="reddish" style="text-anchor:middle" x="0" y="5">1.0, 1.1</text>
    </g>
    <g id="types" transform="translate(130,20)">
      <use xlink:href="#literal"/>
      <text class="reddish" style="text-anchor:middle" x="0" y="5">text/xml, application/xml</text>
    </g>
    <g id="schemas" transform="translate(130,20)">
      <use xlink:href="#literal"/>
      <text class="reddish" style="text-anchor:middle" x="0" y="5">http://../.../XHTML-1.0</text>
    </g>
  </defs>
  <g transform="scale(0.6)">
    <use xlink:href="#My" transform="translate(0,0)"/>
    <use xlink:href="#component" transform="translate(130,60)"/>
	   <line x1="130" y1="40" x2="130" y2="60" class="yellowish" style="stroke-width:3"/>
    <g transform="translate(460,40)">
      <use xlink:href="#R_TH"/>
      <use xlink:href="#applicability" transform="translate(130,60)"/>
      <use xlink:href="#allow" transform="translate(130,160)"/>
	     <line x1="130" y1="40" x2="130" y2="160" class="yellowish" style="stroke-width:3"/>
    </g>
    <g transform="translate(920,80)">
      <use xlink:href="#Empty" transform="translate(0,0)" />
      <use xlink:href="#wmlVersion" transform="translate(130,60)"/>
	     <line x1="130" y1="40" x2="130" y2="60" class="yellowish" style="stroke-width:3"/>
      <use xlink:href="#Empty" transform="translate(0,100)" />
      <use xlink:href="#clientType" transform="translate(130,160)"/>
      <use xlink:href="#clientSchema" transform="translate(130,220)"/>
	     <line x1="130" y1="140" x2="130" y2="220" class="yellowish" style="stroke-width:3"/>
    </g>
    <g transform="translate(1380,120)">
      <use xlink:href="#L_320" transform="translate(0,0)" />
      <use xlink:href="#types" transform="translate(0,100)" />
      <use xlink:href="#schemas" transform="translate(0,160)" />
    </g>
  </g>
</svg>
