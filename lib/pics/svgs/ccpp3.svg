<?xml version="1.0" standalone="no"?>
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg  xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-210 0 1100 850">
  <defs>
    <marker id="Triangle" viewBox="0 0 10 10" refX="0" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="5" orient="auto">
        <path class="reddish" fill="red" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>
  <!-- **************  Screen Display Area  ******************** -->
  <g transform="translate(0,100)">
    <g transform="translate(80,180)">
       <image xlink:href="../svgClipArt/Server.svg" width="150" height="240" />
    </g>
    <text class="minor" x="80" y="400">Origin server</text>
    <g transform="translate(680,200)">
      <image xlink:href="../svgClipArt/workstation.svg" width="155" height="185"/>
    </g>
    <line x1="660" y1="270" x2="250" y2="270" style="stroke:red; marker-end:url(#Triangle)"/>
    <rect width="30" height="15" style="fill:blue" y="263" x="600"/>
    <rect width="30" height="15" style="fill:green" y="278" x="600"/>
    <text class="minor" x="300" y="250">1. Request in HTTP with profile</text>
    <line x1="250" y1="340" x2="660" y2="340" style="stroke:red; marker-end:url(#Triangle)"/>
    <text class="minor" x="225" y="370">2. Response in HTTP with adapted content</text>
    <rect class="yellowish" x="-180" y="200" width="210" height="50"/>
    <text class="minor" x="-170" y="230">Document profile</text>
    <rect class="yellowish" x="-180" y="350" width="210" height="50"/>
    <text class="minor" x="-170" y="380">Device profile</text>
    <text class="minor" x="-200" y="290">2. Server matches profile</text>
    <text class="minor" x="-200" y="320">against document profile</text>
  </g>
</svg>
