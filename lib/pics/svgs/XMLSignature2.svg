<?xml version="1.0" standalone="no"?>
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1100 800">
    <defs>
        <marker id="RedTriangle" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="5" orient="auto">
            <path class="reddish" d="M 0 0 L 10 5 L 0 10 z"/>
        </marker>
        <marker id="GrayTriangle" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="5" orient="auto">
            <path class="grayish" d="M 0 0 L 10 5 L 0 10 z"/>
        </marker>
        <ellipse class="yellowish" style="stroke-width:1" id="Step" ry="50" rx="150">
            <desc>basic ellipse background for the processing steps</desc>
        </ellipse>
        <g id="transforms">
            <use xlink:href="#Step"/>
            <text class="centre minor" y="-8">Apply transformations
              <tspan x="0" dy="30">(C14N, XSLT, XPath,...)</tspan>
            </text>
        </g>
        <g id="get">
            <use xlink:href="#Step"/>
            <text class="centre minor" y="6">Get (XML) data</text>
        </g>
        <g id="digest">
            <use xlink:href="#Step"/>
            <text class="centre minor" y="-8">Generate digest and
            <tspan x="0" dy="30">compare to stored</tspan></text>
        </g>
        <g id="c14n">
            <use xlink:href="#Step"/>
            <text class="centre minor" y="-8">Canonicalize
              <tspan x="0" dy="30" class="code">SignedInfo</tspan>
            </text>
        </g>
        <g id="check">
            <use xlink:href="#Step"/>
            <text class="centre minor" y="-8">Check signature of
            <tspan x="0" dy="30" class="code">SignedInfo</tspan>
            </text>
        </g>
        <g id="nextStep">
            <line y1="50" y2="100" class="reddish" marker-end="url(#RedTriangle)"/>
        </g>
    </defs>
    <g transform="translate(0,50)">
        <line x1="290" y1="160" x2="700" y2="30" class="grayish" marker-end="url(#GrayTriangle)"/>
        <line x1="420" y1="230" x2="700" y2="180" class="grayish" marker-end="url(#GrayTriangle)"/>
        <line x1="420" y1="265" x2="700" y2="180" class="grayish" marker-end="url(#GrayTriangle)"/>
        <line x1="420" y1="335" x2="700" y2="330" class="grayish" marker-end="url(#GrayTriangle)"/>
        <line x1="550" y1="370" x2="700" y2="330" class="grayish" marker-end="url(#GrayTriangle)"/>
        <line x1="480" y1="95" x2="700" y2="480" class="grayish" marker-end="url(#GrayTriangle)"/>
        <line x1="545" y1="582" x2="700" y2="630" class="grayish" marker-end="url(#GrayTriangle)"/>
        <line x1="510" y1="620" x2="700" y2="630" class="grayish" marker-end="url(#GrayTriangle)"/>
        <line x1="420" y1="129" x2="700" y2="630" class="grayish" marker-end="url(#GrayTriangle)"/>
        <g transform="translate(850)">
            <use xlink:href="#get" transform="translate(0,30)"/>
            <use xlink:href="#transforms" transform="translate(0,180)"/>
            <use xlink:href="#digest" transform="translate(0,330)"/>
            <use xlink:href="#c14n" transform="translate(0,480)"/>
            <use xlink:href="#check" transform="translate(0,630)"/>
            <use xlink:href="#nextStep" transform="translate(0,30)"/>
            <use xlink:href="#nextStep" transform="translate(0,180)"/>
            <use xlink:href="#nextStep" transform="translate(0,330)"/>
            <use xlink:href="#nextStep" transform="translate(0,480)"/>
            <path style="stroke:red; fill: none; stroke-width:3"
                marker-end="url(#RedTriangle)" d="M150 330 h50 v-300 h-50"/>
        </g>
        <g transform="translate(20)">
            <text class="codeM">
                <tspan x="0" y="30">&lt;Signature&gt;</tspan>
                <tspan x="30" dy="35" class="reddish">&lt;SignedInfo&gt;</tspan>
                <tspan x="60" dy="35">&lt;CanonicalizationMethod Algorithm="..."/&gt;</tspan>
                <tspan x="60" dy="35">&lt;SignatureMethod Algorithm="..."/&gt;</tspan>
                <tspan x="60" dy="35">&lt;Reference URI="..."&gt;</tspan>
                <tspan x="90" dy="35">&lt;Transforms&gt;</tspan>
                <tspan x="120" dy="35">&lt;Transform Algorithm="..."/&gt;</tspan>
                <tspan x="120" dy="35">&lt;Transform Algorithm="..."/&gt;</tspan>
                <tspan x="90" dy="35">&lt;/Transforms&gt;</tspan>
                <tspan x="90" dy="35">&lt;DigestMethod Algorithm="..."/&gt;</tspan>
                <tspan x="90" dy="35">&lt;DigestValue&gt;ABGTHI*^OM..&lt;/DigestValue&gt;</tspan>
                <tspan x="60" dy="35">&lt;/Reference&gt;</tspan>
                <tspan x="60" dy="35">&lt;Reference URI="..."&gt;</tspan>
                <tspan x="90" dy="35">...</tspan>
                <tspan x="60" dy="35">&lt;/Reference&gt;</tspan>
                <tspan x="30" dy="35" class="reddish">&lt;/SignedInfo&gt;</tspan>
                <tspan x="30" dy="35">&lt;SignatureValue&gt;*%KiTG)(YHC...&lt;/SignatureValue&gt;</tspan>
                <tspan x="30" dy="35">&lt;KeyInfo&gt;&lt;KeyValue&gt;...&lt;/KeyValue&gt;&lt;/KeyInfo&gt;</tspan>
                <tspan x="0" dy="35">&lt;/Signature&gt;</tspan>
            </text>
        </g>
    </g>
</svg>
