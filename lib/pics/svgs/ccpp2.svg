<svg  xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-210 0 1100 850">
  <defs>
    <marker id="Triangle" viewBox="0 0 10 10" refX="0" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="5" orient="auto">
        <path class="reddish" fill="red" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>
  <!-- **************  Screen Display Area  ******************** -->
  <g transform="translate(-100,-100)">
    <g transform="translate(80,180)">
       <image xlink:href="../svgClipArt/Server.svg" width="150" height="240" />
    </g>
    <text class="minor" x="80" y="400">Origin server</text>
    <g transform="translate(680,200)">
      <image xlink:href="../svgClipArt/workstation.svg" width="155" height="185"/>
    </g>
    <g transform="translate(80,600)">
       <image xlink:href="../svgClipArt/Server.svg" width="150" height="240" />
    </g>
    <text class="minor" x="20" y="830">CC/PP Profile Repository</text>
    <line x1="660" y1="270" x2="250" y2="270" style="stroke:red; marker-end:url(#Triangle)"/>
    <line x1="250" y1="340" x2="660" y2="340" style="stroke:red; marker-end:url(#Triangle)"/>
    <line x1="120" y1="410" x2="120" y2="600" style="stroke:red; marker-end:url(#Triangle)"/>
    <line x2="190" y2="420" x1="190" y1="610" style="stroke:red; marker-end:url(#Triangle)"/>
    <rect width="30" height="15" style="fill:blue" y="263" x="600"/>
    <rect width="30" height="15" style="fill:green" y="278" x="600"/>
    <rect width="30" height="15" style="fill:green" x="105" y="450"/>
    <text class="minor" x="280" y="220">1. Request  with profile</text>
    <text class="minor" x="280" y="250">containing default references</text>
    <text class="minor" x="205" y="480">2. Server resolves default references</text>
    <text class="minor" x="205" y="510">and combines the information</text>
    <text class="minor" x="225" y="370">3. Response with adapted content</text>
    
  </g>
</svg>
