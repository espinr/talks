<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="50 25 640 500">
    <style type="text/css">
    line.arrow {
					stroke-width:4 !important; 
					marker-start:url(#ArrowBegin) !important; 
					marker-end: url(#ArrowEnd) !important;
			}
    line.arrowwsdl {
			    stroke: blue !important;
					fill: none;
					stroke-width:3 !important; 
					marker-start:url(#ArrowBeginWSDL) !important; 
					stroke-dasharray:15 10;
			}
			path.arrowwsdl {
			    stroke: none !important;
					fill: blue !important;
			}
			text.c, tspan.c { text-anchor:middle }			
  </style>
    <defs>
        <marker id="ArrowBegin" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="5" orient="auto">
            <desc>Arrowhead for the beginning of the line (a reversed triangle)</desc>
            <path class="arrow" d="M 10 0 L 0 5 L 10 10 z"/>
        </marker>
        <marker id="ArrowBeginWSDL" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="5" orient="auto">
            <desc>Arrowhead for the beginning of the line (a reversed triangle)</desc>
            <path class="arrowwsdl" d="M 10 0 L 0 5 L 10 10 z"/>
        </marker>
        <marker id="ArrowEnd" viewBox="0 0 10 10" refX="0" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="5" orient="auto">
            <desc>Arrowhead for the end of a line (a triangle)</desc>
            <path class="arrow" d="M 0 0 L 10 5 L 0 10 z"/>
        </marker>
        <g id="ClientApp">
            <rect class="yellowish" width="150" height="140"/>
            <text class="minor c" x="75" y="60">Service
                <tspan class="minor c" x="75" dy="30">Requestor</tspan>
            </text>
        </g>
        <g id="WSTravel">
            <rect class="blueish" width="150" height="140"/>
            <text class="minor whitish c" x="75" y="60">Service 
				      <tspan class="minor whitish c" x="75" dy="30">Provider</tspan>
            </text>
        </g>
        <g id="Discovery">
            <rect class="blueish" width="150" height="140"/>
            <text class="minor whitish c" x="75" y="60">Discovery
				      <tspan class="minor whitish c" x="75" dy="30">Agency</tspan>
            </text>                        
        </g>
        <path id="tp1" d="M215 280 L 280 210"/>
        <path id="tp2" d="M470 210 L 535 280"/>
    </defs>
    <g transform="translate(0,-20)">
        <use xlink:href="#ClientApp" transform="translate(100,300)"/>
        <use xlink:href="#WSTravel" transform="translate(500,300)"/>
        <use xlink:href="#Discovery" transform="translate(300,50)"/>
        <line class="arrow" x1="285" y1="370" x2="465" y2="370"/>
        <text class="minor centre" x="375" y="410">Interaction</text>
        <line class="arrow" x1="215" y1="280" x2="280" y2="210"/>
        <text class="minor centre">
            <textPath xlink:href="#tp1" startOffset="50%"><tspan dy="-15">Find</tspan></textPath>
        </text>
        <line class="arrow" x1="535" y1="280" x2="470" y2="210"/>
        <text class="minor centre">
            <textPath xlink:href="#tp2" startOffset="50%"><tspan dy="-15">Publish</tspan></textPath>
        </text>
    </g>
</svg>
