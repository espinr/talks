<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 20001102//EN"
  "http://www.w3.org/TR/2000/CR-SVG-20001102/DTD/svg-20001102.dtd">
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg  width="900px" height="300px" >


<rect class="background" x="0" y="0" width="900" height="300"/>

<g transform="translate(0,100)">


<g transform="translate(0,60)">
<path id="MyPath" d="M -480 100 
C -380 20 -300   -60 -220 20
C -60 100 20 180 100 100
C 100 20 180   -60 260 20
C 340 100 420 180 500 100
C 580 20 660 20 660 20
C 740 100 820 180 900 100
" style="fill:none; stroke:none" />

<text class="yellowish" style="font-size:28;font-family:Verdana">
<textPath xlink:href="#MyPath" startOffset="0%">
<animate  attributeName="startOffset" from="0%" to="99%" begin="8s"  dur="6s" />
Has
<tspan dy="-30" style="fill:red">
 over 500
      </tspan>
      <tspan dy="30">
 
      </tspan>
 members
</textPath>
</text>
</g>
<g transform="translate(0,60)">
<path  d="M -480 100 
C -380 20 -300   -60 -220 20
C -60 100 20 180 100 100
C 100 20 180   -60 260 20
C 340 100 420 180 500 100
C 580 20 660 20 660 20
C 740 100 820 180 900 100
" style="fill:none; stroke:none" />

<text class="yellowish" style="font-size:28;font-family:Verdana">
<textPath xlink:href="#MyPath" startOffset="0%">
<animate  attributeName="startOffset" from="0%" to="99%" begin="12s"  dur="8s" />
But
<tspan dy="-30" style="fill:red">
 there will be more!
      </tspan>
</textPath>
</text>
</g>
</g>





<g transform="translate(20,40)">
<text class="yellowish" style="font-size:48; font-family:Courier; font-weight:bold">
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;0;0"  begin="0s"  dur="3s" fill="freeze" />W</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;0;40" begin="0.5s"  dur="3s" fill="freeze" />W</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;40;80" begin="1s"  dur="3s" fill="freeze" />W</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;120;160" begin="2s"  dur="3s" fill="freeze" />C</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;160;220" begin="2.5s"  dur="3s" fill="freeze" />o</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;220;260" begin="3s"  dur="3s" fill="freeze" />n</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;260;300" begin="3.5s"  dur="3s" fill="freeze" />s</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;300;340" begin="4s"  dur="3s" fill="freeze" />o</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;340;380" begin="4.5s"  dur="3s" fill="freeze" />r</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;380;420" begin="5s"  dur="3s" fill="freeze" />t</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;420;460" begin="5.5s"  dur="3s" fill="freeze" />i</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;460;500" begin="6s"  dur="3s" fill="freeze" />u</tspan>
<tspan x="1200" y="30"><animate  attributeName="x" values="1200;500;540" begin="6.5s"  dur="3s" fill="freeze" />m</tspan>

</text>
</g>












</svg>


