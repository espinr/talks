  <desc>The slide has three major blocks: a block with a symbolic server and a workstation, labelled with recs like SMIL, XHTML, etc; a block with a picture of a PDA and a phone, logically attached to the server in the previous block, labelled CCPP, XSLT, etc; and a block consisting of two more servers and a "cloud" in the middle labbeled *XML*. All servers are connected to the cloud, and the third block has labels like Web services, xml signatures, etc.

There is a set of animation objects; the user can switch the blocks on one after the other, the second and third block being, initially, invisible.</desc>
