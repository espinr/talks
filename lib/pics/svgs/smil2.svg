    </g>

    <g transform="translate(385,420)">
      <rect style="fill:white;" width="232" height="50" />

      <text x="10" y="24" style="color:black;">train 2</text>
    </g>

    <g transform="translate(350,60)">
      <rect style="fill:yellow;" width="140" height="50" />

      <text x="10" y="24" style="color:black;">Bob</text>
    </g>

    <g transform="translate(390,360)">
      <rect style="fill:yellow;" width="65" height="50" />

