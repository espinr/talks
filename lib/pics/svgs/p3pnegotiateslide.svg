<?xml version="1.0" standalone="no"?>
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 350">
    <style type="text/css"><![CDATA[
		circle { fill: red; stroke: black;
		         stroke-width: 1
		}
		path.p3p { fill: white; stroke: black;
		         stroke-width: 1
		}
		feSpecularLighting { lighting-color:green }
	]]></style>
    <defs>
        <filter id="effect">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
            <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
            <feSpecularLighting in="blur" surfaceScale="8" specularConstant="1" specularExponent="10" result="specOut">
                <fePointLight x="-5000" y="-10000" z="5000" />
            </feSpecularLighting>
            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litPaint"/>
            <feMerge>
                <feMergeNode in="offsetBlur"/>
                <feMergeNode in="litPaint"/>
            </feMerge>
        </filter>
        <g id="terminal">
            <g id="monitorStand" transform="translate(40,100)" filter="url(#effect)">
                <rect class="grayish" width="80" height="20" x="0" y="0"/>
                <path class="p3p" d="m0,0 S 10 10 40 12"/>
                <path class="p3p" d="m80,0 S 70 10 40 12"/>
                <path class="p3p" d="m0,20 L 10 10 S 40 12 70 10 L 80 20z"/>
            </g>
            <g id="monitor" transform="translate(0 -20)" filter="url(#effect)">
                <rect class="grayish" width="160" height="120" rx="6"/>
                <rect class="table" width="138" height="95" x="11" y="12" rx="6"/>
            </g>
            <g id="processor" transform="translate(0 120)" filter="url(#effect)">
                <rect class="grayish" width="160" height="60"/>
                <g id="discDrive" transform="translate(70,10)">
                    <rect class="disc" width="58" height="3" x="12" y="8"/>
                    <rect class="light" width="8" height="2" x="12" y="15"/>
                </g>
                <circle cx="135" cy="40" r="5"/>
            </g>
        </g>
        <marker id="Triangle" viewBox="0 0 10 10" refX="0" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="5" orient="auto">
            <path class="reddish" fill="red" d="M 0 0 L 10 5 L 0 10 z"/>
        </marker>
    </defs>
    <g transform="scale(0.80) translate(0,-180)">
        <g transform="translate(40,150)">
            <g transform="scale(1.8)">
                <use xlink:href="#terminal"/>
            </g>
            <text x="20" y="0" class="note" style="text-anchor:start">
                <tspan x="22" dy="20">Who is collecting data?</tspan>
                <tspan x="22" dy="20">What information is collected?</tspan>
                <tspan x="22" dy="20">For what purpose will it be used?</tspan>
                <tspan x="22" dy="20">Who else has access to the data?</tspan>
                <tspan x="22" dy="20">How will disputes be resolved?</tspan>
            </text>
        </g>
        <g transform="translate(880,150)">
            <g transform="scale(1.8)">
                <use xlink:href="#terminal"/>
            </g>
            <text x="20" y="0" class="note" style="text-anchor:start">
                <tspan x="22" dy="20">Will you visit sites that track</tspan>
                <tspan x="22" dy="20">and save information about</tspan>
                <tspan x="22" dy="20">what you looked at?</tspan>
                <tspan x="22" dy="23">Will you visit sites that place</tspan>
                <tspan x="22" dy="20">cookies on your PC so they can</tspan>
                <tspan x="22" dy="20">identify you when you return?</tspan>
            </text>
        </g>
        <g transform="translate(460,260)">
            <g transform="scale(1.8)">
                <use xlink:href="#terminal"/>
            </g>
            <text x="20" y="0" class="note" style="text-anchor:start">
                <tspan x="22" dy="20">This site does not meet</tspan>
                <tspan x="22" dy="20">your privacy preferences</tspan>
                <tspan x="22" dy="23">Would you still like to fill</tspan>
                <tspan x="22" dy="20">out this form?</tspan>
            </text>
        </g>
        <text x="30 " y="550" class="major">1. Site Defines Policy</text>
        <text x="840" y="550" class="major">2. User Defines Preferences</text>
        <text x="460" y="640" class="major">3.1 Browser retrieves Policy</text>
        <text x="460" y="680" class="major">3.2 Compares with User's Preferences</text>
        <text x="460" y="720" class="major">3.3 Warns user if there is a conflict</text>
        <line x1="340" y1="200" x2="440" y2="380" marker-end="url(#Triangle)"/>
        <line x1="860" y1="200" x2="770" y2="380" marker-end="url(#Triangle)"/>
    </g>
</svg>
