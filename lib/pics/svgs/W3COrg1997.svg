<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-10 -20 1120 750">
    <title>Organizational chart of W3C in a tabular form for the year 1997. </title>
    <desc>Coloumns correspond to Domain, with Activities and Groups indented</desc>
    <style type="text/css">
		 text          { font-family:Arial, Helvetica, sans-serif;  stroke:none; text-anchor: middle;  }
		 rect          { stroke: none }
	   rect.domain   { fill: navy }
	   text.domain   { font-size:20; fill: white; font-weight: bold } 
	   rect.activity { fill: blue; stroke: inherit }
	   text.activity { font-size:16; fill: white; font-weight: bold } 
	   rect.group    { fill: aquamarine; stroke: inherit }
	   text.group    { font-size:16; fill: black }
	   path          { stroke-width: 1; stroke: black; fill: none }
	   use.new         { stroke: red; stroke-width:3  } 
	  </style>
    <defs>
        <rect width="180" height="25" class="activity" id="activityBase"/>
        <rect width="160" height="20" class="group" id="groupBase"/>
        <g id="activity">
            <use xlink:href="#activityBase"/>
            <path d="M0 12.5 h-20"/>
        </g>
        <g id="group">
            <use xlink:href="#groupBase"/>
            <path d="M0 10 h-10"/>
        </g>
        <g id="domain">
            <rect width="210" height="25" class="domain"/>
            <path d="M105,0 v-10"/>
        </g>
    </defs>
    <desc>Algorithm to use: each domain is in its own group.
       Within each domain, the activities are within their groups; 
       vertical position is the sum of the previous domains 'y' + 45 + last group y + 30
       vertical displacement for the dependency line for groups: 45+ last group y + 10
    </desc>
    <g transform="translate(150,0)">
        <path d="M105,-10 h440"/>
        <g>
            <desc>Architecture domain</desc>
            <use xlink:href="#domain"/>
            <text x="105" y="19" class="domain">Architecture</text>
            <g transform="translate(40,45)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Addressing: URL</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,120)">
                <desc>XML Activity</desc>
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Generic SGML</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,195)">
                <desc>Jigsaw Activity</desc>
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Jigsaw</text>
            </g>
            <g transform="translate(40,225)">
                <desc>DOM Activity, with one WG and one IG</desc>
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Protocols: HTTP</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,300)">
                <desc>DOM Activity, with one WG and one IG</desc>
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Prop, Repl, Caching</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,375)">
                <desc>DOM Activity, with one WG and one IG</desc>
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Real Time Media</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <path d="M20 25 V387.5"/>
        </g>
        <g transform="translate(220)">
            <use xlink:href="#domain"/>
            <text x="105" y="19" class="domain">User Interface</text>
            <g transform="translate(40,45)">
                <desc>Jigsaw Activity</desc>
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Amaya, Arena</text>
            </g>
            <g transform="translate(40,75)">
                <desc>Web Sercvices</desc>
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Graphics</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,150)">
                <desc>Web Sercvices</desc>
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">HTML</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,225)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Internationalization</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,300)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Fonts</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,375)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Style</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">CSS WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <path d="M20 25 V387.5"/>
        </g>
        <g transform="translate(440)">
            <use xlink:href="#domain"/>
            <text x="105" y="19" class="domain">Technology &amp; Society</text>
            <g transform="translate(40,45)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Access for Disabled</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,120)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Content Rating</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">PICS WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,195)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Digital Signature</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,270)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Electr. Commerce</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">JEPI WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,345)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">IPR</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <g transform="translate(40,420)">
                <use xlink:href="#activity"/>
                <text x="90" y="19" class="activity">Privacy &amp; Demogr.</text>
                <g transform="translate(20,45)">
                    <desc>All the groups</desc>
                    <g>
                        <use xlink:href="#group"/>
                        <text x="80" y="15" class="group">WG</text>
                    </g>
                </g>
                <path d="M10 25 V55"/>
            </g>
            <path d="M20 25 V432.5"/>
        </g>
    </g>
</svg>
