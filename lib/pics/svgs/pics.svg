<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 20001102//EN"
  "http://www.w3.org/TR/2000/CR-SVG-20001102/DTD/svg-20001102.dtd">
<svg  width="960px" height="720px" >
<defs>
<style type="text/css">
<![CDATA[
rect {stroke:black;fill:white;}
line {stroke:red;stroke-width:4}
rect.box {stroke:none;fill:rgb(140, 189, 237)}
text {font-family:Arial;font-size:18}

]]>
</style>
</defs>


<defs>

<symbol id="blocker" >
<g  style="fill:red;stroke:black" >
<path d="M0 0 L0 60 L80 90 L80 30Z"/>
</g>
</symbol>

<symbol id="reddisc" >
<g>
<ellipse cx="30" cy="60" rx="30" ry="12" style="fill:white;stroke:black" />
<rect x="0" y="20" width="60" height="40" style="fill:white;stroke:white" />
<ellipse cx="30" cy="20" rx="30" ry="12" style="fill:red;stroke:black" />
<line x1="0" y1="20" x2="0" y2="60" style="stroke:black;stroke-width:1" />
<line x1="60" y1="20" x2="60" y2="60" style="stroke:black;stroke-width:1" />
</g>		
</symbol>

<symbol id="greendisc" >
<g>
<ellipse cx="30" cy="60" rx="30" ry="12" style="fill:white;stroke:black" />
<rect x="0" y="20" width="60" height="40" style="fill:white;stroke:white" />
<ellipse cx="30" cy="20" rx="30" ry="12" style="fill:green;stroke:black" />
<line x1="0" y1="20" x2="0" y2="60" style="stroke:black;stroke-width:1" />
<line x1="60" y1="20" x2="60" y2="60" style="stroke:black;stroke-width:1" />
</g>		
</symbol>
</defs>

<!-- **************  Screen Display Area  ******************** -->
