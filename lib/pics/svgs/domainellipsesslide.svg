<?xml version="1.0" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1010 810">
	<title>Visual overview of the various w3c domains and activities</title>
	<desc>A rough visual overview of the various activities, as a set of recursive ellipses.
	      Ellipses are used to separate domains, included ellipses for activities, etc.</desc>
	<!-- There are too many specialized styles here to burden the 'central' style file
	     The slide looks o.k. on light background, too, provided the text.centre style is 
	     correctly set in the included style sheet.
  -->
	<style type="text/css"><![CDATA[
     rect       {stroke:black;fill:white;}
     line       {stroke:red;stroke-width:2}
     rect.box   {stroke:none;fill:rgb(140, 189, 237)}
     
     text        {font-family:Arial, Helvetica, sans-serif;  fill:#0C469C; stroke:none}
	  text.centre {text-anchor:middle; stroke:none; fill:green}
    
    .domain {stroke:none;fill:yellow;}
    .act    {stroke:none;fill:cyan;} 			 		 		   /* Activity */
    .ig     {stroke:none;fill:darkseagreen;}				   /* Interest Group */
    .wg     {stroke:none;fill:lavender;}					   /* Working Group */
    .wgig   {stroke:none;fill:darkkhaki;}					   /* Working and Interest Group */		
    .coo    {stroke:none;fill:red;fill-opacity:0.1}      /* Coordination Group */

    text.s1  {font-size:18;text-anchor:middle}
    text.s2  {font-size:12;text-anchor:middle}
    text.s3  {font-size:12;text-anchor:middle}
    text.coo {color: white; fill-opacity: 1; fill:red; font-weight: bold}
    path.s5  {fill:blue;fill-opacity:0.15}
    ]]></style>
	<!-- For some reasons, the animation does not work. Maybe a plugin problem? Has to be tested
	     again with the final version of the plugin -->
	<defs>
		<set xlink:href="#CoordinationGroups" attributeType="CSS" attributeName="visibility" to="visible" begin="Legend.click" fill="freeze"/>
		<set xlink:href="#CoordinationGroups" attributeType="CSS" attributeName="visibility" to="visible" begin="Title.click" fill="freeze"/>
		<set xlink:href="#CoordinationGroups" attributeType="CSS" attributeName="visibility" to="hidden" begin="CoordinationGroups.click" fill="freeze"/>
	</defs>
	<g id="Main">
		<g transform="translate(443,325)" id="Title">
        <svg viewBox="0 0 90 51" width="90" height="51">
  <path d="M74.5,.2l0.8,5.1l-3,5.6c0,0-1.13-2.39-3-3.7c-1.6-1.1-2.6-1.4-4.2-1c-2.1,0.4-4.4,2.9-5.4,5.9c-1.2,3.6-1.2,5.4-1.3,7c-0.07,2.6,0.3,4.14,0.3,4.1s-1.8-3.3-1.8-8.1c0.01-3.5,0.6-6.6,2.2-9.7c1.41-2.7,3.5-4.4,5.4-4.5c1.9-0.2,3.4,0.7,4.6,1.7c1.2,1,2.5,3.3,2.5,3.4z"/>
  <path d="M74.9,28.8c0,0-1.3,2.3-2.1,3.2c-.8.9-2.3,2.5-4.1,3.3c-1.8.8-2.7.9-4.5,0.8c-1.8-.2-3.4-1.2-4-1.6s-2-1.7-2.9-2.9c-.8-1.2-2.1-3.5-2.1-3.5s.7,2.4,1.2,3.3c.3.6,1.1,2.3,2.2,3.9c1.1,1.4,3.1,3.9,6.3,4.4c3.1,.6,5.3-.9,5.8-1.2c.5-.3,1.7-1.3,2.4-2.1c.7-.8,1.4-1.8,1.8-2.4c.3-.4,0.7-1.3.7-1.3z"/>
  <path style="fill:#0C479D" d="M20.7,0.43l7.1,24.1l7.1-24.1h5.1l-11.7,39.6h-.5l-7.35-24.5l-7.35,24.5h-.5l-11.7-39.6h5.1l7.1,24.1l4.8-16.2l-2.3-7.9z"/>
  <path style="fill:#0C479D" d="M54.6,27.3c0,3.6-1,6.6-2.9,9c-1.9,2.4-4.4,3.7-7.4,3.7c-2.3,0-4.3-0.7-5.9-2.2c-1.7-1.4-2.9-3.4-3.8-5.9l4-1.7c.6,1.5,1.4,2.7,2.3,3.5c1,.9,2.1,1.3,3.4,1.3c1.4,0,2.5-.8,3.5-2.3c.9-1.5,1.4-3.4,1.4-5.5c0-2.4-.5-4.2-1.5-5.5c-1.2-1.5-3-2.3-5.5-2.3h-2v-2.3l6.8-11.8h-8.2l-2.3,3.9h-1.5v-8.7h19.1v2.4l-7.2,12.5c2.5.8,4.5,2.3,5.8,4.4c1.3,2.1,2,4.7,1.9,7.5z"/>
  <text x="78" y="10" style="font-size:13">&#174;</text>
        </svg>
		</g>
		<!-- ************** Architecture ****************-->
		<g class="arch" transform="translate(500,110)">
			<desc>Architecture domain</desc>
			<ellipse class="domain" rx="250" ry="100"/>
			<text class="s1" y="75" x="-100">Architecture</text>
			<g transform="translate(60,-75)">
				<ellipse class="act" rx="30" ry="15"/>
				<text class="s2" y="2">Jigsaw</text>
			</g>
			<g transform="translate(-90,-70)">
				<ellipse class="act" rx="30" ry="15"/>
				<text class="s2" y="3">URI</text>
			</g>
			<g transform="translate(0,62)">
				<ellipse class="act" rx="30" ry="20"/>
				<ellipse class="wg" rx="25" ry="15"/>
				<text class="s3" y="2">DOM</text>
			</g>
			<g transform="translate(-120,0)">
				<ellipse class="act" rx="90" ry="50"/>
				<text class="s2">
					<tspan x="-55">Web</tspan>
					<tspan x="-55" dy="10">Services</tspan>
				</text>
				<g transform="translate(-20,-28)">
					<ellipse class="wg" rx="45" ry="15"/>
					<text class="s3" y="2">XML Protocol</text>
				</g>
				<g transform="translate(35,0)">
					<ellipse class="wg" rx="45" ry="15"/>
					<text class="s3" y="2">Architecture</text>
				</g>
				<g transform="translate(-20,28)">
					<ellipse class="wg" rx="40" ry="15"/>
					<text class="s3" y="2">Description</text>
				</g>
			</g>
			<g transform="translate(100,0)">
				<ellipse class="act" rx="100" ry="55"/>
				<text class="s2">XML</text>
				<g transform="translate(-20,-35)">
					<ellipse class="wg" rx="30" ry="15"/>
					<text class="s3" y="2">Core</text>
				</g>
				<g transform="translate(65,-15)">
					<ellipse class="wg" rx="25" ry="15"/>
					<text class="s3" y="2">Linking</text>
				</g>
				<g transform="translate(-60,0)">
					<ellipse class="wg" rx="30" ry="15"/>
					<text class="s3" y="2">Schema</text>
				</g>
				<g transform="translate(15,35)">
					<ellipse class="wg" rx="30" ry="15"/>
					<text class="s3" y="2">Query</text>
				</g>
			</g>
		</g>
		<!-- **************T and S ****************-->
		<g class="ts" transform="translate(730,610)">
			<desc>Technology &amp; Society domain</desc>
			<ellipse class="domain" rx="250" ry="145"/>
			<text class="s1" x="0" y="-100">Technology &amp; Society</text>
			<g transform="translate(-125,-40)">
				<ellipse class="act" rx="100" ry="55"/>
				<text class="s2" x="14" y="-22">Semantic Web</text>
				<g transform="translate(-48,0)">
					<ellipse class="wg" rx="40" ry="15"/>
					<text class="s3" y="2">RDF Core</text>
				</g>
				<g transform="translate(0,37)">
					<ellipse class="ig" rx="25" ry="12"/>
