				</g>
			</g>
			<g transform="translate(-25,80)">
				<ellipse class="act" rx="85" ry="20"/>
				<ellipse class="ig" rx="80" ry="15"/>
				<text class="s2" y="3">Synchronized Multimedia</text>
			</g>
			<g transform="translate(130,-35)">
				<ellipse class="act" rx="50" ry="20"/>
				<ellipse class="wg" rx="45" ry="15"/>
				<text class="s2" y="2">Voice Browser</text>
			</g>
		</g>
		<g id="Legend" transform="translate(470,390)">
			<g transform="scale(0.1)">
				<rect x="-10" y="-10" style="fill:yellow" height="125" width="320"/>
				<g transform="translate(0,0)">
					<rect class="act" width="30" height="30"/>
					<text x="35" y="25" style="font-size:24">Activity</text>
				</g>
				<g transform="translate(0,35)">
					<rect class="ig" width="30" height="30"/>
					<text x="35" y="25" style="font-size:24">Interest Group</text>
				</g>
				<g transform="translate(0,70)">
					<rect class="wg" width="30" height="30"/>
					<text x="35" y="25" style="font-size:24">Working Group</text>
				</g>
			</g>
		</g>
