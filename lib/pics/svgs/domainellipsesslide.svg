				</g>
			</g>
			<g transform="translate(-165,50)">
				<ellipse class="act" rx="40" ry="25"/>
				<ellipse class="wg" rx="35" ry="20"/>
				<text class="s3" y="-8">XML</text>
				<text class="s3" y="8">Encryption</text>
			</g>
			<g transform="translate(-75,50)">
				<ellipse class="act" rx="40" ry="25"/>
				<ellipse class="wg" rx="35" ry="20"/>
				<text class="s3" y="-7">XML</text>
				<text class="s3" y="8">Signature</text>
			</g>
			<g transform="translate(0,110)">
				<ellipse class="act" rx="45" ry="27"/>
				<ellipse class="wg" rx="40" ry="22"/>
				<text class="s2" y="-8">XML Key</text>
				<text class="s2" y="8">Management</text>
			</g>
			<g transform="translate(110,0)">
				<ellipse class="act" rx="130" ry="40"/>
				<text class="s2" x="-2" y="4">Privacy</text>
				<g transform="translate(75,0)">
					<ellipse class="wg" rx="50" ry="20"/>
					<text y="-4" class="s3">P3P Policy &amp;</text>
					<text y="10" class="s3"> Outreach</text>
				</g>
				<g transform="translate(-70,0)">
					<ellipse class="wg" rx="40" ry="25"/>
					<text y="-8" class="s3">P3P</text>
					<text y="8" class="s3">Specification</text>
				</g>
			</g>
		</g>
		<!-- ************** WAI****************-->
		<g class="wai" transform="translate(250,610)">
			<desc>WAI</desc>
			<ellipse class="domain" rx="200" ry="160"/>
			<text class="s1" transform="translate(-115,20)">
				<tspan x="0" dy="0">Web Accessibility</tspan>
				<tspan x="0" dy="20">Initiative (WAI)</tspan>
			</text>
			<g transform="translate(0,90)">
				<ellipse class="act" rx="120" ry="50"/>
				<text class="s2" transform="translate(-38,-30)">
					<tspan x="0">International</tspan>
					<tspan x="0" dy="10">Program Office</tspan>
				</text>
				<g transform="translate(-45,10)">
					<ellipse class="wg" rx="65" ry="25"/>
					<text class="s3" y="3">Education &amp; Outreach</text>
				</g>
				<g transform="translate(55,-20)">
					<ellipse class="ig" rx="30" ry="15"/>
					<text class="s3" y="3">Interest</text>
				</g>
				<g transform="translate(55,20)">
					<ellipse class="ig" rx="30" ry="15"/>
					<text class="s3" y="3">R &amp; D</text>
				</g>
			</g>
			<g transform="translate(0,-65)">
				<ellipse class="act" rx="160" ry="70"/>
				<text class="s2" y="3">Technical</text>
				<g transform="translate(45,-40)">
					<ellipse class="wg" rx="50" ry="20"/>
					<text class="s3" y="2">Authoring Tools</text>
				</g>
				<g transform="translate(115,-5)">
					<ellipse class="wg" rx="40" ry="20"/>
					<text class="s3" y="2">User Agent</text>
				</g>
				<g transform="translate(40,43)">
					<ellipse class="wg" rx="40" ry="20"/>
					<text class="s3" y="2">Web Content</text>
				</g>
				<g transform="translate(-70,30)">
					<ellipse class="wg" rx="60" ry="20"/>
					<text class="s3" y="-1">Evaluation &amp; Repair</text>
					<text class="s3" y="15">Tools</text>					
				</g>
				<g transform="translate(-70,-30)">
					<ellipse class="wg" rx="60" ry="20"/>
					<text class="s3" y="2">Protocols &amp; Formats</text>
				</g>
			</g>
		</g>
		<!-- ************** Document Formats ****************-->
		<g class="ui" transform="translate(210,300)">
			<desc>Document Formats</desc>
			<ellipse class="domain" rx="210" ry="130"/>
			<text x="-35" y="-20" class="s1">Document Formats</text>
			<g transform="translate(-115,-65)">
				<ellipse class="act" rx="55" ry="20"/>
				<ellipse class="wg" rx="50" ry="15"/>
				<text class="s2" y="3">Graphics (SVG)</text>
			</g>
			<g transform="translate(40,-80)">
				<ellipse class="act" rx="60" ry="20"/>
				<ellipse class="wg" rx="55" ry="15"/>
				<text class="s2" x="0" y="2">HTML</text>
			</g>
			<g transform="translate(120,0)">
				<ellipse class="act" rx="65" ry="40"/>
				<text class="s2" y="2">Internationalization</text>
				<g transform="translate(0,-25)">
				  <ellipse class="wg" rx="20" ry="10"/>
				  <text class="s2" y="3">I18N</text>
				</g>
				<g transform="translate(0,25)">
				  <ellipse class="ig" rx="20" ry="10"/>
				  <text class="s2" y="3">I18N</text>
				</g>
			</g>
			<g transform="translate(50,90)">
				<ellipse class="act" rx="30" ry="20"/>
				<ellipse class="wg" rx="25" ry="15"/>
				<text class="s2" y="3">Math</text>
			</g>
			<g transform="translate(-10,110)">
				<ellipse class="act" rx="30" ry="15"/>
				<text class="s2" y="3">Amaya</text>
			</g>
			<g transform="translate(-75,40)">
				<ellipse class="act" rx="100" ry="40"/>
				<text class="s2" y="-20">Style</text>
				<g transform="translate(-50,0)">
					<ellipse class="wg" rx="30" ry="15"/>
					<text class="s3" y="3">XSL</text>
				</g>
				<g transform="translate(50,0)">
					<ellipse class="wg" rx="30" ry="15"/>
					<text class="s3" y="3">CSS</text>
				</g>
			</g>
		</g>
		<!-- ************** Interactive Devices ****************-->
		<g class="ui" transform="translate(790,295)">
			<desc>Interaction</desc>
			<ellipse class="domain" rx="210" ry="128"/>
			<text x="-5" y="30" class="s1">Interaction</text>
			<g transform="translate(150,30)">
				<ellipse class="wg" rx="30" ry="15"/>
				<text class="s3" y="3">XForms</text>
			</g>
			<g transform="translate(-55,-45)">
				<ellipse class="act" rx="110" ry="45"/>
				<text class="s2" x="-20" y="-20">Device Independence</text>
				<g transform="translate(-77,10)">
					<ellipse class="wg" rx="23" ry="10"/>
					<text class="s3" y="4">DI</text>
				</g>
				<g transform="translate(60,0)">
