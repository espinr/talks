	<g>
		<desc>Activities outside a specific domain</desc>
		<g transform="translate(490,270)">
			<ellipse class="act" rx="60" ry="30"/>
			<text class="s2" y="3">Quality Assurance</text>
		</g>
		<g transform="translate(490,470)">
			<ellipse class="wg" rx="60" ry="30"/>
			<text class="s2" y="3">Patent Policy</text>
		</g>
	</g>
	<g>
		<desc>Coordination groups as separate, overlapping ellipses</desc>
		<g id="CoordinationGroups" style="visibility:hidden">
			<g transform="translate(500,300)">
				<desc>XML Coordination group</desc>
				<ellipse class="coo" rx="230" ry="170"/>
				<text x="80" y="-135" class="centre coo">XML</text>
				<text x="80" y="-105" class="centre coo">Coordination Group</text>
			</g>
			<g transform="translate(300,300)">
				<desc>Hypertext Coordination Group</desc>
				<g transform="rotate(15)">
					<ellipse class="coo" rx="240" ry="100"/>
					<text x="-30" y="-10" class="centre coo">Hypertext Coordination Group</text>
				</g>
			</g>
			<g transform="translate(500,250)">
				<desc>Web Services Coordination Group</desc>
				<g transform="rotate(50)">
					<ellipse class="coo" rx="240" ry="100"/>
					<text x="-30" y="-10" class="centre coo">Web Services Coordination Group</text>
				</g>
			</g>
			<g transform="translate(220,350)">
				<desc>WAI Coordination Group</desc>
				<g transform="rotate(-30)">
					<g transform="translate(100,200)">
						<ellipse class="coo" rx="340" ry="100"/>
						<text x="-50" y="-10" class="centre coo">WAI Coordination Group</text>
					</g>
				</g>
			</g>
			<g transform="translate(440,290)">
				<desc>Metadata Coordination Group</desc>
				<g transform="rotate(30)">
					<g transform="translate(250,0)">
						<ellipse class="coo" rx="340" ry="100"/>
						<text x="-50" y="-10" class="centre coo">Semantic Web Coordination Group</text>
					</g>
				</g>
			</g>
			<g transform="translate(440,290)">
				<desc>P3P Coordination Group</desc>
				<g transform="rotate(50)">
					<g transform="translate(250,0)">
						<ellipse class="coo" rx="340" ry="100"/>
						<text x="-50" y="-10" class="centre coo">P3P Coordination Group</text>
					</g>
				</g>
			</g>
		</g>
	</g>
</svg>
