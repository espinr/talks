<?xml version="1.0" standalone="no"?>
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg viewBox="0 0 760 520">
  <title>Simple example for DOM</title>
  <desc>The image consists of 3 block: excerpts of a simple HTML, a pictorial representation of the HTML tree, and an example fora(Javascript) usage of the DOM.</desc>
  <rect width="760" height="520" class="background"/>
  <defs>
    <style type="text/css"><![CDATA[
text {font-size:16}
]]></style>
  </defs>
  <!-- **************  Screen Display Area  ******************** -->
  <g transform="translate(5,60)" style="color:black;">
    <desc>An HTML code excerpt</desc>
    <rect class="empty" width="360" height="256"/>
    <text class="whitish" x="3" y="24">&lt;html></text>
    <text class="whitish" x="3" y="48">&lt;head></text>
    <text class="whitish" x="27" y="72">&lt;title>My Document&lt;/title></text>
    <text class="whitish" x="3" y="96">&lt;/head></text>
    <text class="whitish" x="3" y="120">&lt;body></text>
    <text class="whitish" x="27" y="144">&lt;h1>Example DOM Page&lt;/h1></text>
    <text class="whitish" x="27" y="168">&lt;p>For &lt;b>all&lt;/b> you need to know about</text>
    <text class="whitish" x="27" y="192">&lt;img src="dom.gif"/> and more!&lt;/p></text>
    <text class="whitish" x="3" y="216">&lt;/body></text>
    <text class="whitish" x="3" y="240">&lt;/html></text>
  </g>
  <g transform="translate(420,10)" style="color:red;">
    <desc>Pictorial representation of the HTML tree; each group is a labelled rectangle and these are connected through lines to form a tree</desc>
    <g transform="translate(100,10)">
      <rect class="yellowish" width="100" height="40"/>
      <text x="10" y="24" class="reddish">Document</text>
    </g>
    <line x1="150" y1="50" x2="150" y2="80"/>
    <g transform="translate(100,80)">
      <rect class="yellowish" width="100" height="40"/>
      <text x="10" y="24" class="reddish">0: html</text>
    </g>
    <line x1="146" y1="120" x2="55" y2="150"/>
    <line x1="154" y1="120" x2="230" y2="150"/>
    <g transform="translate(20,150)">
      <rect class="yellowish" width="100" height="40"/>
      <text x="10" y="24" class="reddish">0: head</text>
    </g>
    <g transform="translate(180,150)">
      <rect class="yellowish" width="100" height="40"/>
      <text x="10" y="24" class="reddish">1: body</text>
    </g>
    <line x1="225" y1="190" x2="160" y2="220"/>
    <line x1="235" y1="190" x2="300" y2="220"/>
    <g transform="translate(130,220)">
      <rect class="yellowish" width="60" height="40"/>
      <text x="10" y="24" class="reddish">0:h1</text>
    </g>
    <g transform="translate(270,220)">
      <rect class="yellowish" width="60" height="40"/>
      <text x="10" y="24" class="reddish">1: p</text>
    </g>
    <line x1="300" y1="260" x2="230" y2="290"/>
    <g transform="translate(200,290)">
      <rect class="yellowish" width="60" height="40"/>
      <text x="10" y="24" class="reddish">0: b</text>
    </g>
    <line x1="300" y1="260" x2="300" y2="290"/>
    <g transform="translate(270,290)">
      <rect class="yellowish" width="60" height="40"/>
      <text x="10" y="24" class="reddish">1: img</text>
    </g>
    <line x1="70" y1="190" x2="50" y2="290"/>
    <g transform="translate(20,290)">
      <rect class="yellowish" width="60" height="40"/>
      <text x="10" y="24" class="reddish">0: title</text>
    </g>
  </g>
  <g transform="translate(30,380)" style="color:black;">
    <desc>Simple example for DOM usage</desc>
    <rect class="empty" width="700" height="90"/>
    <text x="5" y="24" class="whitish">document.childNodes[0].childNodes[1].childNodes[0].style.color="red";</text>
    <text x="25" y="48" class="whitish">Changes H1 heading to red</text>
    <text x="25" y="72" class="whitish">This statement may be attached to a click event</text>
  </g>
</svg>
