<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink"  viewBox="0 0 800 130">
  <desc>
    Slide describing the chain of Proxies in a CC/PP transactions. A series of components: left side is an
    image of a phone, then two proxy boxes, finally the origin server. Arrows connecting the components with 
    labels: the top label is Client Profile, then Client Profile Proxy Profile #1, then
    Client Profile Proxy Profile #1 Proxy Profile #2. The labels below
    are (from right to left, which is the logical direction) XHTML, XHTML Basic, and WML.
  </desc>
  <defs>
    <path id="arrowhead" class="arrow" d="M0 10 L 10 0 L 0 -10 z"/>
    <g id="exchange">
      <line x1="0" y1="0" x2="150" y2="0" class="arrow"/>
      <use xlink:href="#arrowhead" transform="translate(150,0)"/>
      <line x1="0" y1="20" x2="150" y2="20" class="arrow"/>
      <use xlink:href="#arrowhead" transform="translate(8,20) rotate(180)"/>
    </g>
    <g id="client">
      <use xlink:href="#exchange"/>
      <text class="reddish" style="text-anchor:middle" x="75" y="-10">Client Profile</text>
      <text class="greenish" style="text-anchor:middle" x="75" y="40">WML</text>
    </g>
    <g id="prox1">
      <use xlink:href="#exchange"/>
      <text class="reddish" style="text-anchor:middle" x="75" y="-30">Proxy Profile #1</text>
      <text class="reddish" style="text-anchor:middle" x="75" y="-10">Client Profile</text>
      <text class="greenish" style="text-anchor:middle" x="75" y="40">XHTML Basic</text>
    </g>
    <g id="prox2">
      <use xlink:href="#exchange"/>
      <text class="reddish" style="text-anchor:middle" x="75" y="-50">Proxy Profile #2</text>
      <text class="reddish" style="text-anchor:middle" x="75" y="-30">Proxy Profile #1</text>
      <text class="reddish" style="text-anchor:middle" x="75" y="-10">Client Profile</text>
      <text class="greenish" style="text-anchor:middle" x="75" y="40">XHTML</text>
    </g>

    <g id="component">
      <rect class="yellowish" width="100" height="50"/>
    </g>
    <g id="proxy1" transform="translate(0,10)">
      <use xlink:href="#component"/>
      <text class="greenish" style="text-anchor:middle" x="50" y="20">Proxy</text>
      <text class="greenish" style="text-anchor:middle" x="50" y="40">#1</text>
    </g>
    <g id="proxy2" transform="translate(0,10)">
      <use xlink:href="#component"/>
      <text class="greenish" style="text-anchor:middle" x="50" y="20">Proxy</text>
      <text class="greenish" style="text-anchor:middle" x="50" y="40">#2</text>
    </g>
    <g id="origin" transform="translate(0,10)">
      <use xlink:href="#component"/>
      <text class="greenish" style="text-anchor:middle" x="50" y="20">Origin</text>
      <text class="greenish" style="text-anchor:middle" x="50" y="40">Server</text>
    </g>
  </defs>
  <g transform="scale(0.87) translate(-40,40)">
    <image x="45" y="-5" width="37" height="86" xlink:href="../jpgs/indexp2.jpg"/>
    <use xlink:href="#client" x="100" y="28"/>
    <use xlink:href="#proxy1" x="270"/>
    <use xlink:href="#prox1" x="380" y="28"/>
    <use xlink:href="#proxy2" x="550"/>
    <use xlink:href="#prox2" x="660" y="28"/>
    <use xlink:href="#origin" x="830"/>
  </g>
</svg>
