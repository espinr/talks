<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- <?xml-stylesheet type="text/css" href="http://www.w3.org/Consortium/Offices/Presentations/svgs/slide.css" ?> -->
<?xml-stylesheet type="text/css" href="slide.css" ?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 500" >
  <style type="text/css">
    path.arrowLine, polyline.arrowLine, line.arrow {
								 stroke-width:4 !important; 
								 marker-start:url(#ArrowBegin) !important; 
								 marker-end: url(#ArrowEnd) !important;
			}			
  </style>
  <defs>
  		<marker id="ArrowBegin" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth" 
			        markerWidth="8" markerHeight="5" orient="auto">
				<desc>Arrowhead for the beginning of the line (a reversed triangle)</desc>
  			<path class="arrow" d="M 10 0 L 0 5 L 10 10 z"/>
  		</marker>
  		<marker id="ArrowEnd" viewBox="0 0 10 10" refX="0" refY="5" markerUnits="strokeWidth" 
			        markerWidth="8" markerHeight="5" orient="auto">
				<desc>Arrowhead for the end of a line (a triangle)</desc>
  			<path class="arrow" d="M 0 0 L 10 5 L 0 10 z"/>
  		</marker>
			<image id="user" width="150" height="150" xlink:href="../svgClipArt/UserMan.svg"/>
			<image id="server" width="100" height="100" xlink:href="../svgClipArt/Server.svg"/>
    <image id="PDA" width="100" height="100" transform="scale(0.7)" xlink:href="../pngs/palm.png">
      <desc>Image of a (Palm) PDA</desc>
    </image>
    <image id="phone" width="37" height="86" xlink:href="../jpgs/indexp2.jpg">
      <desc>Image of a portable phone</desc>
    </image>
			<image id="workstation" width="140" height="120" transform="scale(0.7)" xlink:href="../pngs/workstation.png">
			  <desc>Image of a workstation</desc>
		 </image>
			<g id="FirstStage">
				 <use xlink:href="#user" transform="translate(20,80)"/>
  	 	 <use xlink:href="#server" transform="translate(600,100)"/>
  			 <use xlink:href="#workstation" transform="translate(200,100)"/>
  			 <line class="arrow" x1="330" y1="150" x2="580" y2="150"/> 
			</g>
			<g id="SecondStage">
  			 <use xlink:href="#PDA" transform="translate(220,0)"/>
  			 <use xlink:href="#phone" transform="translate(230,200)"/>
  			 <line class="arrow" x1="330" y1="40" x2="580" y2="130"/> 
  			 <line class="arrow" x1="330" y1="230" x2="580" y2="170"/> 
			</g>
			<g id="ThirdStage">
    	 <use xlink:href="#server" transform="translate(1000,100)"/>
  			 <line class="arrow" x1="730" y1="150" x2="980" y2="150"/> 
			</g>
			<g id="LabelFirst" transform="translate(220,350)">
  			 <text class="major">
  			     <tspan  class="major" x="0" dy="0">Interaction</tspan>
  			     <tspan  class="major" x="0" dy="40">Document formats</tspan>
  			     <tspan  class="major" x="0" dy="40">Profiling</tspan>
  			     <tspan  class="major" x="0" dy="40">...</tspan>
  			 </text>
			</g>
			<g id="LabelSecond" transform="translate(900,350)">
  			 <text class="major">
  			     <tspan  class="major" x="0" dy="0">Web services</tspan>
  			     <tspan  class="major" x="0" dy="40">Semantic Web</tspan>
  			     <tspan  class="major" x="0" dy="40">XML Databases</tspan>						 
  			     <tspan  class="major" x="0" dy="40">...</tspan>
  			 </text>
			</g>
  </defs>
	 <g>
  	 <use xlink:href="#FirstStage"/>
  	 <use xlink:href="#SecondStage"/>
  	 <use xlink:href="#ThirdStage"/>
  	 <use xlink:href="#LabelFirst"/>
  	 <use xlink:href="#LabelSecond"/>	 
	 </g>
</svg>
