    <script>
        < ![CDATA[
            var play_state = false;

            function play() {
                if (play_state) {
                    // pause
                    document.getElementById("stop").disabled = true;
                    play_state = false;
                    try {
                        document.getElementById("vid").pause();
                    } catch (e) {}
                    document.getElementById("play").textContent = "Reaunudar";
                } else {
                    document.getElementById("stop").disabled = false;
                    play_state = true;
                    document.getElementById("play").textContent = "Pausar";
                    try {
                        document.getElementById("vid").play();
                    } catch (e) {}
                }
            }

            function stop() {
                play_state = false;
                document.getElementById("stop").disabled = true;
                try {
                    document.getElementById("vid").pause();
                    document.getElementById("vid").currentTime = 0;
                } catch (e) {}
                document.getElementById("play").innerHTML = "<span style='color:red'>P</span><span style='color:green'>l</span>a<span style='color:blue'>y</span>";
            }
            rotation = 10; color = 1;

            function changeRotation() {
                var elementStyle = document.getElementById("rotate").style;
                var rotext = "rotate(" + rotation + "deg)";
                elementStyle.setProperty("-moz-transform", rotext, "");
                elementStyle.setProperty("-webkit-transform", rotext, "");
                elementStyle.setProperty("-o-transform", rotext, "");
                elementStyle.setProperty("transform", rotext, "");
                scolor = "blue";
                if (color == 0) {
                    scolor = "green";
                } else if (color == 1) {
                    scolor = "blue";
                } else if (color == 2) {
                    scolor = "red";
                } else if (color == 3) {
                    scolor = "yellow";
                }
                document.getElementById("rotate").style.setProperty("color",
                    scolor, "");

                rotation += 10;

                if (color == 4) {
                    color = 0;
                } else {
                    color += 1;
                }
            }
            var videoRotation = 5;

            function rotateVideo() {
                var vid = document.getElementById("vid");
                if (vid.currentTime > 10) {
                    var elementStyle = vid.style;
                    var rotext = "rotate(" + (videoRotation += 2) + "deg)";
                    elementStyle.setProperty("-moz-transform", rotext, "");
                    elementStyle.setProperty("-o-transform", rotext, "");
                    elementStyle.setProperty("-webkit-transform", rotext, "");
                    elementStyle.setProperty("transform", rotext, "");
                }
            }

            function changeMath() {
                row = document.getElementById("row");
                msup = row.parentNode;
                msqrt = document.createElementNS("http://www.w3.org/1998/Math/MathML", "msqrt");
                msqrt.appendChild(row);
                msup.parentNode.replaceChild(msqrt, msup);
            }
            var stdDeviation = 0.5;

            function modifySVG() {
                document.getElementById("gauss").setAttribute("stdDeviation", stdDeviation);
                stdDeviation = stdDeviation + 0.5;
            }

            function updateSVG() {
                document.getElementById("svgText").textContent = document.getElementById("input").value;
            }

            function RDFAHighlight() {
                __RDFA_BASE = 'http://www.w3.org/2006/07/SWD/RDFa/impl/js/';
                if (document.getElementById('rdfa_highlight_bm%20')) {
                    alert('only once!');
                } else {
                    s = document.createElement('script');
                    s.type = 'text/javascript';
                    s.id = 'rdfa_highlight_bm';
                    s.src = 'http://www.w3.org/2006/07/SWD/RDFa/impl/js/highlight-metadata.js';
                    document.getElementsByTagName('head')[0].appendChild(s);
                }
            };

            function resetDemo() {
                stdDeviation = 0.01;
                modifySVG();

                document.getElementById("svgText").textContent = document.getElementById("input").value = "Esto es SVG";

                row = document.getElementById("row");
                msqrt = row.parentNode;
                msup = document.createElementNS("http://www.w3.org/1998/Math/MathML", "msup");
                mi = document.createElementNS("http://www.w3.org/1998/Math/MathML", "mi");
                mi.textContent = "e";
                msup.appendChild(mi);
                msup.appendChild(row);
                msqrt.parentNode.replaceChild(msup, msqrt);

                rotation = 0;
                color = 0;
                changeRotation();
                stop();
            }
        ]] >
    </script>
